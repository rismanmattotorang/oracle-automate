# Declared Oracle Fusion monitoring jobs.  Each fires through the
# gateway, hits an MCP tool, and posts the result to the declared
# channel (when an adapter is registered).
#
# These are the canonical examples from paper §IX-B P4, re-fitted for Oracle.

[[jobs]]
name = "aac_sod_weekly_summary"
tool = "oracle.docs.search"
channel = "cli:fin-ops"
arguments = { query = "Advanced Access Controls segregation of duties incidents recent", top_k = 3, domain = "all" }
schedule = { kind = "weekly", weekday = 1, hour = 8, minute = 0 }

[[jobs]]
name = "app_portfolio_eol_quarterly"
tool = "kb.global_query"
channel = "cli:enterprise-arch"
arguments = { query = "application portfolio years-to-EOL replacement roadmap", top_k = 3 }
schedule = { kind = "quarterly", day = 1, hour = 9, minute = 0 }

[[jobs]]
name = "period_close_daily"
tool = "oracle.docs.search"
channel = "cli:fin-ops"
arguments = { query = "general ledger period close transfer to GL revaluation", top_k = 3 }
schedule = { kind = "daily", hour = 7, minute = 30 }

[[jobs]]
name = "sandbox_publish_qa_hourly"
tool = "oracle.docs.search"
channel = "cli:config"
arguments = { query = "sandbox publish validation configuration package promotion", top_k = 2 }
schedule = { kind = "hourly", minute = 15 }
