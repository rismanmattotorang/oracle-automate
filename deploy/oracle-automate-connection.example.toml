# Oracle-Automate — live Oracle Fusion connection template.
#
# Copy this file to a destination on the search path and select it with
# `--destination <name>` or `ORACLE_AUTOMATE_DESTINATION=<name>`.  Search order
# (highest priority first):
#
#   1. $ORACLE_AUTOMATE_DESTINATION_DIR/<name>.toml
#   2. ./.oracle-automate/destinations/<name>.toml        (project-local)
#   3. ~/.config/oracle-automate/destinations/<name>.toml (per-user)
#
# Example for a destination named "dev-fusion":
#   mkdir -p ./.oracle-automate/destinations
#   cp deploy/oracle-automate-connection.example.toml \
#      ./.oracle-automate/destinations/dev-fusion.toml
#   # edit the file, then:
#   ORACLE_AUTOMATE_DESTINATION=dev-fusion ./target/release/oracle-automate-server
#
# SECURITY: this file holds credentials.  Keep it out of version control
# (./.oracle-automate/ is gitignored) and prefer a secrets manager in prod.
# The server never logs the password/token — only the `auth_type` label.

# `name` is optional — the lookup key (the filename you select) always wins.
base_url = "https://gaussian-dev.fa.ocs.oraclecloud.com"
client   = "100"
language  = "EN"

# --- Auth: pick exactly one [auth] block. ---

# HTTP Basic — most common for an on-prem dev tenant with a technical user.
[auth]
type     = "basic"
user     = "INTEGRATION_USER"
password = "change-me"

# Bearer token (JWT / IDCS-IAM access token):
# [auth]
# type  = "bearer"
# token = "eyJhbGc..."

# Oracle IDCS/IAM OAuth2 client (confidential app) — wiring lands in Sprint 4:
# [auth]
# type = "service_key"
# path = "/etc/oracle-automate/xsuaa-service-key.json"

# Mutual TLS (on-prem) — wiring lands in Sprint 4:
# [auth]
# type      = "certificate"
# cert_path = "/etc/oracle-automate/client.pem"
# key_path  = "/etc/oracle-automate/client.key"
