# TEMPLATE — do NOT commit a populated copy.
# Use a real secret-management workflow (External Secrets Operator,
# Sealed Secrets, HashiCorp Vault injector, etc.) in production.
#
# Create your real Secret with `kubectl create secret generic ...`
# or via your secret operator of choice.
apiVersion: v1
kind: Secret
metadata:
  name: oracle-automate-secrets
  namespace: oracle-automate
type: Opaque
stringData:
  # Oracle Fusion Cloud ERP connection (resolved by the credential provider).
  # Live-transport wiring (Fusion REST / SOAP ERP Integration / BI Publisher)
  # lands with the live-transport sub-phase; these are the target vars.
  ORACLE_FUSION_BASE_URL: "REPLACE_ME"   # e.g. "https://gaussian.fa.ocs.oraclecloud.com"
  ORACLE_FUSION_AUTH:     "oauth2"       # oauth2 (IDCS/IAM client-credentials) | basic
  # OAuth2 client-credentials (preferred):
  ORACLE_FUSION_OAUTH_TOKEN_URL: "REPLACE_ME"  # IDCS/IAM token endpoint
  ORACLE_FUSION_CLIENT_ID:       "REPLACE_ME"
  ORACLE_FUSION_CLIENT_SECRET:   "REPLACE_ME"
  ORACLE_FUSION_SCOPE:           "urn:opc:resource:fa:instanceid"
  # Basic auth fallback (integration/technical user, not personal):
  # ORACLE_FUSION_USER:     "REPLACE_ME"
  # ORACLE_FUSION_PASSWORD: "REPLACE_ME"

  # MCP HTTP transport bearer token (clients must pass `Authorization: Bearer …`).
  MCP_BEARER_TOKEN: "REPLACE_ME"

  # Embedding provider (when wired in P9 finalisation).
  OPENAI_API_KEY: "REPLACE_ME"
