apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-automate-server
  namespace: oracle-automate
  labels:
    app.kubernetes.io/name: oracle-automate-server
    app.kubernetes.io/part-of: oracle-automate
    app.kubernetes.io/component: mcp-server
spec:
  # 3 replicas — matches paper §IV-K reference deployment topology.
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: oracle-automate-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oracle-automate-server
        app.kubernetes.io/part-of: oracle-automate
        app.kubernetes.io/component: mcp-server
      annotations:
        # Surface the AGENTS.md ConfigMap as a hash so the Deployment
        # restarts when the file changes.
        checksum/agents-md: "OVERRIDE_VIA_HELM_OR_KUSTOMIZE"
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "3030"
    spec:
      serviceAccountName: oracle-automate
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532          # distroless nonroot UID
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
      containers:
        - name: server
          image: ghcr.io/acme/oracle-automate:OVERRIDE_VIA_KUSTOMIZE
          imagePullPolicy: IfNotPresent
          args:
            - "--transport"
            - "http"
            - "--bind"
            - "0.0.0.0:3030"
            - "--pool-size"
            - "$(ORACLE_AUTOMATE_POOL_SIZE)"
            - "--embedding-dim"
            - "$(ORACLE_AUTOMATE_EMBEDDING_DIM)"
            - "--agents-md"
            - "/etc/oracle-automate/AGENTS.md"
            # Read-only by default; the write-enabled Deployment lives
            # in a separate namespace with extra authorization checks.
          envFrom:
            - configMapRef:
                name: oracle-automate-config
            - secretRef:
                name: oracle-automate-secrets
          ports:
            - name: http
              containerPort: 3030
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: 3030
            failureThreshold: 30
            periodSeconds: 1
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3030
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: agents-md
              mountPath: /etc/oracle-automate
              readOnly: true
            - name: skills
              mountPath: /etc/oracle-automate/skills
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: agents-md
          configMap:
            name: oracle-automate-config
            items:
              - key: AGENTS.md
                path: AGENTS.md
        - name: skills
          configMap:
            name: oracle-automate-skills
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: oracle-automate-server
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oracle-automate
  namespace: oracle-automate
automountServiceAccountToken: false
