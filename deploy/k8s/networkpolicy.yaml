# Default-deny + allow-list pattern.  Anything not explicitly permitted
# below is rejected.  Hardens the perimeter so a compromised pod can't
# pivot to other namespaces or to the Oracle Fusion pod over an unexpected port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oracle-automate-server-deny-all
  namespace: oracle-automate
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: oracle-automate-server
  policyTypes:
    - Ingress
    - Egress
  # Ingress: only the namespace's own ingress-controller / gateway.
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network/gateway: "true"
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: oracle-automate-gw
      ports:
        - port: 3030
          protocol: TCP
  # Egress: DNS + Oracle Fusion (HTTPS 443) + observability collector.
  egress:
    # Cluster DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Oracle Fusion pod / OIC (configure CIDR or use a FQDN egress per environment).
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8         # CHANGE THIS to the actual Oracle Fusion / OIC CIDR
      ports:
        - port: 443                 # HTTPS / Fusion REST + OIC
          protocol: TCP
    # OTLP collector
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
